name: CI

# Manual only. x86 is covered by the local dev loop (`cargo nextest`), so remote
# CI is spent only when asked — run it (Actions → CI → Run workflow) when a change
# could affect the AArch64 backend (codegen, TSO barriers, anything host-specific).
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # x86-64 host: the "native" leg of the whole-program tests executes the guest
  # ELF directly, so this is the full three-way (native==interp==JIT). Handy as a
  # clean-room check, though the local dev loop already covers x86.
  x86_64:
    name: test (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Formatting
        run: nix develop --command cargo fmt --all --check
      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets --features x86jit-tests/unicorn -- -D warnings
      - name: Tests
        env:
          RUST_BACKTRACE: "1"
        run: nix develop --command cargo nextest run --workspace --features x86jit-tests/unicorn --no-fail-fast --success-output final

  # AArch64 host: can't exec an x86-64 ELF, so the native leg is skipped (see
  # x86jit-tests `reference`) and interp==JIT + interp==Unicorn carry the
  # validation — this is what exercises the Cranelift ARM backend and the TSO
  # barriers. The reason this workflow exists.
  aarch64:
    name: test (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Formatting
        run: nix develop --command cargo fmt --all --check
      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets --features x86jit-tests/unicorn -- -D warnings
      - name: Tests
        env:
          RUST_BACKTRACE: "1"
        run: nix develop --command cargo nextest run --workspace --features x86jit-tests/unicorn --no-fail-fast --success-output final

# Pre-commit configuration.
#
# Split by cost so the fast gate catches the common mistake without slowing every
# commit:
#   pre-commit  — generic hygiene + `cargo fmt --check` (fast). Runs on every commit.
#   pre-push    — `cargo clippy -D warnings` + the perf-gate (release bench vs
#                 bench/baseline.json; blocks a >10% regression unless
#                 X86JIT_ALLOW_PERF_REGRESSION=1). Both too slow/noisy per-commit.
#   manual      — markdownlint / shellcheck / gitleaks — run on demand with
#                 `pre-commit run --all-files --hook-stage manual`.
# fmt is the gate that keeps rustfmt drift out of CI (it hadn't run since drift
# crept in and the CI Formatting step failed).
#
# Activate in your local clone with:
#   pre-commit install --install-hooks
# (`default_install_hook_types` installs both the pre-commit and pre-push hooks.)

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        files: '\.rs$'
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy -D warnings
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        pass_filenames: false
        files: '\.rs$'
        stages: [pre-push]

      # aarch64 is the primary target but developed on x86 hosts, and parts of the
      # tree are `cfg(target_arch = "aarch64")` — notably the barrier_tests module,
      # which calls `translate_block` and so breaks whenever its signature changes.
      # An x86 build cannot see that; only CI could, one push later. This is a
      # type-check of the cross target, not a test run, so it costs seconds.
      - id: cargo-check-aarch64
        name: cargo check --target aarch64 (cross-target compile guard)
        language: system
        entry: cargo check -p x86jit-cranelift --target aarch64-unknown-linux-gnu --tests
        pass_filenames: false
        files: '\.rs$'
        stages: [pre-push]

      - id: perf-gate
        name: perf regression gate (bench vs baseline)
        language: system
        entry: scripts/perf-gate.sh
        pass_filenames: false
        files: '\.rs$'
        stages: [pre-push]

      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint
        files: '\.md$'
        exclude: '^(LICENSE|PROJECT\.md)'
        stages: [manual]

      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        files: '\.(sh|bash)$'
        stages: [manual]

      - id: gitleaks
        name: gitleaks
        language: system
        entry: gitleaks protect --staged --verbose
        pass_filenames: false
        stages: [manual]

      # Active on every commit. Refuses to sign when user.email has no
      # matching UID on the configured GPG signing key. Vendored so the
      # repo is self-contained.
      - id: gpg-uid-guard
        name: gpg UID matches user.email
        language: script
        entry: scripts/uid-guard.sh
        pass_filenames: false
        always_run: true

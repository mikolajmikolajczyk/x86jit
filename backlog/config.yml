project_name: "x86jit"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["cargo nextest run (--features unicorn) green, minus fuzz_robustness", "cargo clippy --all-targets --all-features -- -D warnings clean", "cargo fmt --check clean (nix-pinned rustfmt)"]
date_format: yyyy-mm-dd hh:mm
max_column_width: 80
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
